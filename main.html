<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    .footer {
      background: #111;
      color: #fff;
      padding: 40px 20px;
    }

    /* IMPORTANT: Cypress expects this class */
    .link-boxes {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 20px;
    }

    .footer-section {
      flex: 1 1 200px;
    }

    .footer-section h3 {
      margin-bottom: 15px;
      color: #f4b400;
    }

    .footer-section ul {
      list-style: none;
    }

    .footer-section ul li {
      margin-bottom: 10px;
    }

    .footer-section ul li a {
      color: #ccc;
      text-decoration: none;
    }

    .footer-section ul li a:hover {
      color: #fff;
    }

    /* IMPORTANT: Cypress expects this class */
    .media-icons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .media-icons a {
      color: #fff;
      background: #333;
      padding: 10px;
      border-radius: 50%;
    }

    .media-icons a:hover {
      background: #f4b400;
      color: #000;
    }

    @media (max-width: 768px) {
      .link-boxes {
        flex-direction: column;
        text-align: center;
      }

      .media-icons {
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <footer class="footer">
    <div class="link-boxes">

      <!-- Home -->
      <div class="footer-section">
        <h3>Home</h3>
        <ul>
          <li><a href="#">Homepage</a></li>
        </ul>
      </div>

      <!-- About -->
      <div class="footer-section">
        <h3>About</h3>
        <ul>
          <li><a href="#">Our Story</a></li>
          <li><a href="#">Mission</a></li>
        </ul>
      </div>

      <!-- Links -->
      <div class="footer-section">
        <h3>Links</h3>
        <ul>
          <li><a href="#">Homepage</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Blog</a></li>
        </ul>
      </div>

      <!-- Services -->
      <div class="footer-section">
        <h3>Services</h3>
        <ul>
          <li><a href="#">Web Design</a></li>
          <li><a href="#">SEO</a></li>
          <li><a href="#">Marketing</a></li>
        </ul>
      </div>

      <!-- Contact -->
      <div class="footer-section">
        <h3>Contact</h3>
        <ul>
          <li>8879887262</li>
          <li><a href="#">Contact Form</a></li>
        </ul>

        <!-- Social Media Icons -->
        <div class="media-icons">
          <a href="#"><i class="fab fa-facebook-f"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-linkedin-in"></i></a>
          <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
      </div>

    </div>
  </footer>

</body>
</html>
